version: '3.8'

services:

  # ── PHP + Apache App ────────────────────────────────────────
  app:
    build: .
    container_name: nms_app
    ports:
      - "8080:80"
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: newsletter_db
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key-in-production}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      FROM_EMAIL: ${FROM_EMAIL:-newsletter@college.edu}
      FROM_NAME: ${FROM_NAME:-Newsletter System}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      APP_ENV: production
    volumes:
      # Persist uploaded images
      - uploads_data:/var/www/html/backend/uploads
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # ── MongoDB ─────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: nms_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  mongo_data:
  uploads_data:
